name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      ANTHROPIC_API_KEY: ci-placeholder
      GEMINI_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      RESEND_API_KEY: ci-placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Security boundary regression
        run: npm run qa:security-boundaries

      - name: Architecture boundary regression
        run: npm run qa:architecture-boundaries

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Build
        run: npm run build
