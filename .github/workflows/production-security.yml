name: Production security monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'

jobs:
  boundaries:
    name: Verify live security boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      E2E_BASE_URL: https://conviveconnect.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live security checks
        run: npm run test:e2e:security

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-security-report
          path: playwright-report/
          retention-days: 14
