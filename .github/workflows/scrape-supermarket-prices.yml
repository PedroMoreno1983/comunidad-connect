name: Scrape supermarket prices

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      terms:
        description: "Comma-separated product searches"
        required: false
        type: string

concurrency:
  group: supermarket-price-scrape
  cancel-in-progress: false

jobs:
  scrape-and-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPERMARKET_SEARCH_TERMS: ${{ inputs.terms || 'arroz,leche,huevos,aceite,pan molde,pollo,carne molida,papas,tomates,detergente' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser runtime
        run: |
          python -m pip install --disable-pip-version-check playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Scrape and persist current prices
        run: python scripts/ingest_supermarket_prices.py --limit 5 --pretty
